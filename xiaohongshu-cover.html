<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书招聘封面生成器 - 天津就业服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
            font-size: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .preview-area {
            margin-top: 40px;
            display: none;
        }

        .preview-area.show {
            display: block;
        }

        .preview-title {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .cover-preview {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            aspect-ratio: 1/1;
            background: linear-gradient(180deg, #0a1e44 0%, #1a365d 100%);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .building-image {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background-size: cover;
            background-position: center bottom;
            opacity: 0.4;
            z-index: 1;
        }

        .cover-bg-image {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            z-index: 1;
        }

        .main-title {
            position: absolute;
            top: 15%;
            left: 5%;
            right: 5%;
            z-index: 2;
            color: #d4af37;
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.3;
        }

        .sub-title {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            z-index: 2;
            color: #c0c0c0;
            font-size: 26px;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            line-height: 1.4;
        }

        .building-text {
            position: absolute;
            bottom: 8%;
            left: 5%;
            right: 5%;
            z-index: 2;
            color: rgba(192, 192, 192, 0.6);
            font-size: 20px;
            text-align: center;
        }

        .logo {
            position: absolute;
            top: 5%;
            right: 5%;
            z-index: 2;
            color: rgba(212, 175, 55, 0.6);
            font-size: 14px;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .tips {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .tips h4 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .tips ul {
            margin-left: 20px;
            color: #718096;
            font-size: 14px;
            line-height: 1.8;
        }

        .download-area {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .download-area.show {
            display: block;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #2f855a;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #276749;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
            }

            .main-title {
                font-size: 28px;
            }

            .sub-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>小红书招聘封面生成器</h1>
        <p class="subtitle">天津就业服务 · 一键生成专业招聘封面</p>

        <div class="form-group">
            <label for="mainTitle">主标题（金色大字）</label>
            <input type="text" id="mainTitle" placeholder="例如：天津河北区消防救援支队招聘">
        </div>

        <div class="form-group">
            <label for="subTitle">副标题（银色小字）</label>
            <input type="text" id="subTitle" placeholder="例如：19个名额，高中毕业就能报！">
        </div>

        <div class="form-group">
            <label for="building">标志性建筑/机构名称（用于AI生成背景图）</label>
            <input type="text" id="building" placeholder="例如：天津消防救援支队标志性建筑">
        </div>

        <div class="form-group">
            <label>已生成的背景图片链接（可选）</label>
            <input type="text" id="buildingImageUrl" placeholder="如果已经用AI生成了图片，粘贴图片URL这里，留空则用渐变背景">
        </div>

        <button class="generate-btn" onclick="generatePreview()">生成预览</button>

        <div class="preview-area" id="previewArea">
            <div class="preview-title">📸 封面预览</div>
            <div class="cover-preview" id="coverPreview">
                <div class="building-image" id="buildingImage"></div>
                <div class="logo">天津就业服务</div>
                <div class="main-title" id="previewMainTitle"></div>
                <div class="sub-title" id="previewSubTitle"></div>
            </div>
            <div class="download-area" id="downloadArea">
                <a class="download-btn" onclick="downloadImage()" download="xiaohongshu-cover.png">💾 下载封面图片</a>
            </div>
        </div>

        <div class="tips">
            <h4>💡 使用提示</h4>
            <ul>
                <li>标准小红书封面比例 <strong>1:1 正方形</strong>，直接保存就能用</li>
                <li>深蓝色背景 + 金色标题 + 银色副标题，专业沉稳风格</li>
                <li>下方放标志性建筑图片（AI生成后粘贴URL），透明度 40% 不影响文字</li>
                <li>使用步骤：1) 用AI生成标志性建筑图片 → 2) 复制图片URL粘贴进来 → 3) 生成预览 → 4) 下载</li>
                <li>右键图片 → 图片另存为，也能保存</li>
                <li>生成后保存到本地，然后上传小红书就行</li>
            </ul>
        </div>
    </div>

    <script>
        function generatePreview() {
            const mainTitle = document.getElementById('mainTitle').value.trim();
            const subTitle = document.getElementById('subTitle').value.trim();
            const building = document.getElementById('building').value.trim();
            const imageUrl = document.getElementById('buildingImageUrl').value.trim();

            if (!mainTitle) {
                alert('请输入主标题哦！');
                return;
            }

            document.getElementById('previewMainTitle').textContent = mainTitle;
            document.getElementById('previewSubTitle').textContent = subTitle;

            // 如果有图片URL，设置背景图
            if (imageUrl) {
                document.getElementById('buildingImage').style.backgroundImage = `url(${imageUrl})`;
            } else {
                document.getElementById('buildingImage').style.backgroundImage = 'none';
            }

            document.getElementById('previewArea').classList.add('show');
            document.getElementById('downloadArea').classList.add('show');

            // 平滑滚动到预览
            document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth' });
        }

        function downloadImage() {
            const preview = document.getElementById('coverPreview');
            
            // 创建canvas
            html2canvas(preview).then(canvas => {
                const link = document.createElement('a');
                link.download = 'xiaohongshu-cover.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // 回车也能生成
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generatePreview();
                }
            });
        });
    </script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
